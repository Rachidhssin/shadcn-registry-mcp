<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background: near-black, subtle cool tint -->
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0E0E1C"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>

    <!-- Selected cell fill: deep indigo -->
    <radialGradient id="selFill" cx="273" cy="273" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#211D54"/>
      <stop offset="100%" stop-color="#141232"/>
    </radialGradient>

    <!-- Selected cell outer aura (bleeds past cell edges) -->
    <radialGradient id="selAura" cx="273" cy="273" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4F46E5" stop-opacity="0.50"/>
      <stop offset="55%"  stop-color="#4F46E5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter: sparkle -->
    <filter id="sparkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter: cell border -->
    <filter id="borderGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Halo filter: wide soft aura -->
    <filter id="haloBlur" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to icon shape -->
    <clipPath id="iconClip">
      <rect width="400" height="400" rx="88"/>
    </clipPath>

  </defs>

  <!-- ▓▓▓ BACKGROUND ▓▓▓ -->
  <rect width="400" height="400" rx="88" fill="url(#bg)"/>
  <rect width="400" height="400" rx="88" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.06"/>


  <!-- ▓▓▓ 2×2 COMPONENT GRID ▓▓▓
       Cell size: 126×126  Gap: 20px
       Grid: starts at (64,64), ends at (336,336) — centered in 400px  -->


  <!-- ══ TOP-LEFT CELL: "Card" component ══ -->
  <rect x="64" y="64" width="126" height="126" rx="18" fill="#111118"/>
  <rect x="64" y="64" width="126" height="126" rx="18" fill="none"
        stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.11"/>

  <!-- Mini card header -->
  <rect x="64" y="64" width="126" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.04"/>
  <rect x="64" y="88"  width="126" height="12" fill="#FFFFFF" fill-opacity="0.04"/>
  <!-- Traffic-light dots -->
  <circle cx="82"  cy="82" r="5" fill="#FF5F57" opacity="0.75"/>
  <circle cx="96"  cy="82" r="5" fill="#FEBC2E" opacity="0.75"/>
  <circle cx="110" cy="82" r="5" fill="#28C840" opacity="0.75"/>
  <!-- Content lines -->
  <rect x="82" y="112" width="90" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.12"/>
  <rect x="82" y="126" width="72" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.08"/>
  <rect x="82" y="140" width="82" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.08"/>
  <rect x="82" y="154" width="58" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.08"/>


  <!-- ══ TOP-RIGHT CELL: "Form / Input" component ══ -->
  <rect x="210" y="64" width="126" height="126" rx="18" fill="#111118"/>
  <rect x="210" y="64" width="126" height="126" rx="18" fill="none"
        stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.11"/>

  <!-- Label -->
  <rect x="228" y="92" width="50" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.14"/>
  <!-- Input field -->
  <rect x="228" y="108" width="90" height="24" rx="7" fill="#FFFFFF" fill-opacity="0.04"/>
  <rect x="228" y="108" width="90" height="24" rx="7" fill="none"
        stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.13"/>
  <rect x="236" y="116" width="46" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.11"/>
  <!-- Button -->
  <rect x="228" y="144" width="62" height="22" rx="7" fill="#FFFFFF" fill-opacity="0.05"/>
  <rect x="228" y="144" width="62" height="22" rx="7" fill="none"
        stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.11"/>
  <rect x="238" y="151" width="34" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.14"/>


  <!-- ══ BOTTOM-LEFT CELL: "Table / List" component ══ -->
  <rect x="64" y="210" width="126" height="126" rx="18" fill="#111118"/>
  <rect x="64" y="210" width="126" height="126" rx="18" fill="none"
        stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.11"/>

  <!-- Table header -->
  <rect x="82" y="230" width="90" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.15"/>
  <!-- Divider -->
  <line x1="82" y1="247" x2="172" y2="247" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>
  <!-- Table rows -->
  <rect x="82" y="254" width="70" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.09"/>
  <rect x="82" y="268" width="84" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.09"/>
  <rect x="82" y="282" width="64" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.09"/>
  <rect x="82" y="296" width="76" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.07"/>
  <rect x="82" y="310" width="56" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.07"/>


  <!-- ══ BOTTOM-RIGHT CELL: SELECTED (AI choosing a component) ══ -->

  <!-- Wide aura that bleeds beyond cell boundaries -->
  <rect x="210" y="210" width="126" height="126" rx="18"
        fill="url(#selAura)" filter="url(#haloBlur)"/>

  <!-- Cell fill (deep indigo) -->
  <rect x="210" y="210" width="126" height="126" rx="18" fill="url(#selFill)"/>

  <!-- Glowing border — two layers for depth -->
  <rect x="210" y="210" width="126" height="126" rx="18" fill="none"
        stroke="#4F46E5" stroke-width="3" filter="url(#borderGlow)"/>
  <rect x="210" y="210" width="126" height="126" rx="18" fill="none"
        stroke="#818CF8" stroke-width="1.5" stroke-opacity="0.90"/>

  <!-- Inner inset ring (subtle structure) -->
  <rect x="219" y="219" width="108" height="108" rx="13" fill="none"
        stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.16"/>

  <!-- 4-point sparkle centered at (273, 273)
       outer r=22 → top(273,251) right(295,273) bottom(273,295) left(251,273)
       inner r=8  → diagonals at ±5.66 offset -->
  <path d="M273,251 L278.7,267.3 L295,273 L278.7,278.7 L273,295 L267.3,278.7 L251,273 L267.3,267.3 Z"
        fill="#FFFFFF" fill-opacity="0.96" filter="url(#sparkGlow)"/>

  <!-- Bright center core -->
  <circle cx="273" cy="273" r="5" fill="#FFFFFF"/>
  <circle cx="273" cy="273" r="9" fill="#FFFFFF" fill-opacity="0.18"/>

</svg>
