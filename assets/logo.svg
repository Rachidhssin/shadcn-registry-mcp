<svg width="840" height="200" viewBox="0 0 840 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="840" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C0F"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="35%" stop-color="#8B5CF6"/>
      <stop offset="65%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hubRing" x1="114" y1="84" x2="146" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fadeRule" x1="252" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#27272A"/>
      <stop offset="70%" stop-color="#27272A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#27272A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="200" rx="14" fill="url(#bgGrad)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="200" rx="1.5" fill="url(#accentBar)"/>

  <!-- ── ICON (hub + 4 cards, centre at 128,100) ── -->

  <!-- Hub glow -->
  <ellipse cx="128" cy="100" rx="58" ry="58" fill="url(#hubGlow)"/>

  <!-- Connection lines -->
  <line x1="110" y1="100" x2="94"  y2="100" stroke="#2A2A2E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="146" y1="100" x2="162" y2="100" stroke="#2A2A2E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="128" y1="82"  x2="128" y2="66"  stroke="#2A2A2E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="128" y1="118" x2="128" y2="134" stroke="#2A2A2E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Connection end-nodes (violet dots) -->
  <circle cx="94"  cy="100" r="2.8" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="162" cy="100" r="2.8" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="128" cy="66"  r="2.8" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="128" cy="134" r="2.8" fill="#8B5CF6" opacity="0.7"/>

  <!-- Hub circle -->
  <circle cx="128" cy="100" r="18" fill="#111115" stroke="#2E2E34" stroke-width="1.5"/>
  <circle cx="128" cy="100" r="12" fill="none"    stroke="url(#hubRing)" stroke-width="1.8" filter="url(#glow)"/>
  <circle cx="128" cy="100" r="4.5" fill="#8B5CF6" opacity="0.95"/>

  <!-- Card: LEFT (x=46, y=82, 48×36) -->
  <rect x="46" y="82" width="48" height="36" rx="6" fill="#111115" stroke="#27272A" stroke-width="1.2"/>
  <rect x="54" y="92" width="22" height="3"   rx="1.5" fill="#3F3F46"/>
  <rect x="54" y="99" width="32" height="2.5" rx="1.2" fill="#27272A"/>
  <rect x="54" y="105" width="24" height="2.5" rx="1.2" fill="#27272A"/>

  <!-- Card: RIGHT (x=162, y=82, 48×36) -->
  <rect x="162" y="82" width="48" height="36" rx="6" fill="#111115" stroke="#27272A" stroke-width="1.2"/>
  <rect x="170" y="92" width="28" height="3"   rx="1.5" fill="#3F3F46"/>
  <rect x="170" y="99" width="18" height="2.5" rx="1.2" fill="#27272A"/>
  <rect x="170" y="105" width="28" height="2.5" rx="1.2" fill="#27272A"/>

  <!-- Card: TOP (x=104, y=30, 48×36) -->
  <rect x="104" y="30" width="48" height="36" rx="6" fill="#111115" stroke="#27272A" stroke-width="1.2"/>
  <rect x="112" y="40" width="18" height="3"   rx="1.5" fill="#3F3F46"/>
  <rect x="112" y="47" width="30" height="2.5" rx="1.2" fill="#27272A"/>
  <rect x="112" y="53" width="22" height="2.5" rx="1.2" fill="#27272A"/>

  <!-- Card: BOTTOM — violet accent (MCP) (x=104, y=134, 48×36) -->
  <rect x="104" y="134" width="48" height="36" rx="6" fill="#110E1F" stroke="#6D28D9" stroke-width="1.3"/>
  <rect x="112" y="143" width="30" height="12" rx="3.5" fill="#1A1232"/>
  <text x="116.5" y="152.5" font-family="ui-monospace, 'Courier New', monospace" font-size="7" fill="#A78BFA" font-weight="700" letter-spacing="0.5">MCP</text>
  <rect x="112" y="158" width="22" height="2.5" rx="1.2" fill="#27272A"/>
  <rect x="112" y="163" width="30" height="2.5" rx="1.2" fill="#27272A"/>

  <!-- ── VERTICAL DIVIDER ── -->
  <line x1="234" y1="38" x2="234" y2="162" stroke="#1E1E22" stroke-width="1"/>

  <!-- ── TYPOGRAPHY ── -->

  <!-- wordmark: "shadcn" -->
  <text x="258" y="92"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, 'Courier New', monospace"
        font-size="50" font-weight="700" fill="#FAFAFA" letter-spacing="-2">shadcn</text>

  <!-- subtitle: "registry·mcp" -->
  <text x="261" y="122"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, 'Courier New', monospace"
        font-size="18" font-weight="400" fill="#52525B" letter-spacing="5.5">registry-mcp</text>

  <!-- fade rule under subtitle -->
  <rect x="261" y="130" width="220" height="1" rx="0.5" fill="url(#fadeRule)"/>

  <!-- tagline -->
  <text x="261" y="152"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="12.5" fill="#3F3F46" letter-spacing="0.1">
    Install any shadcn/ui component via your AI assistant — no terminal required.
  </text>

  <!-- Pills -->
  <!-- Node.js pill -->
  <rect x="261" y="164" width="52" height="17" rx="4.5" fill="#111115" stroke="#27272A" stroke-width="1"/>
  <text x="269.5" y="176" font-family="ui-monospace, monospace" font-size="8.5" fill="#52525B">Node 18+</text>

  <!-- TypeScript pill -->
  <rect x="319" y="164" width="68" height="17" rx="4.5" fill="#0F172A" stroke="#1E3A8A" stroke-width="1"/>
  <text x="327" y="176" font-family="ui-monospace, monospace" font-size="8.5" fill="#3B82F6">TypeScript</text>

  <!-- MCP pill (violet accent) -->
  <rect x="393" y="164" width="44" height="17" rx="4.5" fill="#110E1F" stroke="#6D28D9" stroke-width="1"/>
  <text x="402.5" y="176" font-family="ui-monospace, monospace" font-size="8.5" fill="#A78BFA" font-weight="600">MCP</text>

  <!-- MIT pill -->
  <rect x="443" y="164" width="34" height="17" rx="4.5" fill="#111115" stroke="#27272A" stroke-width="1"/>
  <text x="451.5" y="176" font-family="ui-monospace, monospace" font-size="8.5" fill="#52525B">MIT</text>
</svg>
