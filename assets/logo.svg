<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="130" y1="130" x2="270" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E4DCFF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="170" y1="170" x2="230" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#4C1D95" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreBloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="400" height="400" rx="88"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="88" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <g clip-path="url(#rounded)" opacity="0.06">
    <line x1="100" y1="0" x2="100" y2="400" stroke="#8B5CF6" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#8B5CF6" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#8B5CF6" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#8B5CF6" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#8B5CF6" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#8B5CF6" stroke-width="0.5"/>
  </g>

  <!-- Outer border -->
  <rect width="400" height="400" rx="88" fill="none" stroke="#1E1E26" stroke-width="1.5"/>

  <!-- ── COMPONENT CARDS (3 stacked, offset) ── -->

  <!-- Card 3 (back) -->
  <rect x="82" y="108" width="192" height="136" rx="16" fill="#0F0F14" stroke="#1E1E26" stroke-width="1.2" transform="rotate(-6 178 176)"/>

  <!-- Card 2 (middle) -->
  <rect x="82" y="108" width="192" height="136" rx="16" fill="#111118" stroke="#252530" stroke-width="1.2" transform="rotate(-2 178 176)"/>

  <!-- Card 1 (front) -->
  <rect x="82" y="108" width="192" height="136" rx="16" fill="#16161E" stroke="#2E2E3E" stroke-width="1.5"/>
  <!-- Card header bar -->
  <rect x="82" y="108" width="192" height="36" rx="16" fill="#1A1A26"/>
  <rect x="82" y="128" width="192" height="16" fill="#1A1A26"/>
  <!-- Traffic lights -->
  <circle cx="106" cy="126" r="5.5" fill="#FF5F57" opacity="0.7"/>
  <circle cx="122" cy="126" r="5.5" fill="#FEBC2E" opacity="0.7"/>
  <circle cx="138" cy="126" r="5.5" fill="#28C840" opacity="0.7"/>
  <!-- Card content lines -->
  <rect x="100" y="158" width="80" height="7" rx="3.5" fill="#8B5CF6" opacity="0.6"/>
  <rect x="100" y="172" width="154" height="5" rx="2.5" fill="#2E2E3E"/>
  <rect x="100" y="183" width="120" height="5" rx="2.5" fill="#2E2E3E"/>
  <rect x="100" y="194" width="140" height="5" rx="2.5" fill="#2E2E3E"/>
  <rect x="100" y="208" width="96" height="5" rx="2.5" fill="#2E2E3E"/>
  <!-- Card violet accent strip left -->
  <rect x="82" y="124" width="3.5" height="108" rx="2" fill="#8B5CF6" opacity="0.5"/>

  <!-- ── MCP BADGE (bottom-right) ── -->
  <rect x="202" y="212" width="118" height="52" rx="14" fill="#0D0920" stroke="#5B21B6" stroke-width="1.5"/>
  <!-- Badge glow -->
  <rect x="202" y="212" width="118" height="52" rx="14" fill="#8B5CF6" opacity="0.04"/>
  <text x="220" y="232" font-family="ui-monospace, 'Courier New', monospace" font-size="9" fill="#6D28D9" letter-spacing="2" font-weight="600">PROTOCOL</text>
  <text x="220" y="252" font-family="ui-monospace, 'Courier New', monospace" font-size="18" fill="#A78BFA" font-weight="800" letter-spacing="1">MCP</text>

  <!-- ── CONNECTION NODE (glowing dot bottom-left) ── -->
  <circle cx="116" cy="276" r="28" fill="#0D0920"/>
  <circle cx="116" cy="276" r="28" fill="none" stroke="#3B1FA8" stroke-width="1.5"/>
  <circle cx="116" cy="276" r="18" fill="none" stroke="#6D28D9" stroke-width="1" opacity="0.5"/>
  <circle cx="116" cy="276" r="9" fill="url(#coreGrad)" filter="url(#coreBloom)" opacity="0.9"/>
  <circle cx="116" cy="276" r="4" fill="#E4DCFF"/>

  <!-- Connection line from node to card -->
  <line x1="116" y1="248" x2="116" y2="244" stroke="#3B1FA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="276" x2="202" y2="238" stroke="#3B1FA8" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="4 3"/>

  <!-- ── AURA behind everything ── -->
  <ellipse cx="200" cy="200" rx="180" ry="180" fill="url(#aura)" opacity="0.4"/>
</svg>
