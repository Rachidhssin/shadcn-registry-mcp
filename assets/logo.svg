<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F13"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="ring" x1="164" y1="164" x2="236" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="accentCard" x1="0" y1="0" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1232"/>
      <stop offset="100%" stop-color="#0F0A20"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B1FA8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B1FA8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  <rect width="400" height="400" rx="80" fill="url(#bgGlow)"/>
  <rect width="400" height="400" rx="80" fill="none" stroke="#1C1C22" stroke-width="1.5"/>

  <!-- Ambient hub glow -->
  <ellipse cx="200" cy="200" rx="110" ry="110" fill="url(#hubGlow)"/>

  <!-- ── CONNECTION LINES ── -->
  <!-- Top -->
  <line x1="200" y1="162" x2="200" y2="118" stroke="#252528" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 3"/>
  <!-- Bottom -->
  <line x1="200" y1="238" x2="200" y2="282" stroke="#252528" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 3"/>
  <!-- Left -->
  <line x1="162" y1="200" x2="118" y2="200" stroke="#252528" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 3"/>
  <!-- Right -->
  <line x1="238" y1="200" x2="282" y2="200" stroke="#252528" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 3"/>

  <!-- ── COMPONENT CARDS ── -->

  <!-- TOP card -->
  <rect x="162" y="72" width="76" height="46" rx="10" fill="#111115" stroke="#252528" stroke-width="1.2"/>
  <rect x="174" y="84" width="30" height="4.5" rx="2.2" fill="#3F3F46"/>
  <rect x="174" y="93" width="50" height="3.5" rx="1.8" fill="#27272A"/>
  <rect x="174" y="100" width="38" height="3.5" rx="1.8" fill="#27272A"/>
  <circle cx="200" cy="118" r="4" fill="#8B5CF6" opacity="0.75"/>

  <!-- LEFT card -->
  <rect x="72" y="174" width="46" height="52" rx="10" fill="#111115" stroke="#252528" stroke-width="1.2"/>
  <rect x="82" y="185" width="26" height="4.5" rx="2.2" fill="#3F3F46"/>
  <rect x="82" y="194" width="34" height="3.5" rx="1.8" fill="#27272A"/>
  <rect x="82" y="201" width="24" height="3.5" rx="1.8" fill="#27272A"/>
  <rect x="82" y="208" width="30" height="3.5" rx="1.8" fill="#27272A"/>
  <circle cx="118" cy="200" r="4" fill="#8B5CF6" opacity="0.75"/>

  <!-- RIGHT card -->
  <rect x="282" y="174" width="46" height="52" rx="10" fill="#111115" stroke="#252528" stroke-width="1.2"/>
  <rect x="292" y="185" width="26" height="4.5" rx="2.2" fill="#3F3F46"/>
  <rect x="292" y="194" width="34" height="3.5" rx="1.8" fill="#27272A"/>
  <rect x="292" y="201" width="24" height="3.5" rx="1.8" fill="#27272A"/>
  <rect x="292" y="208" width="30" height="3.5" rx="1.8" fill="#27272A"/>
  <circle cx="282" cy="200" r="4" fill="#8B5CF6" opacity="0.75"/>

  <!-- BOTTOM card — violet MCP accent -->
  <rect x="162" y="282" width="76" height="46" rx="10" fill="url(#accentCard)" stroke="#5B21B6" stroke-width="1.3"/>
  <rect x="174" y="293" width="28" height="13" rx="4" fill="#2D1B69"/>
  <text x="179" y="303.5" font-family="ui-monospace, 'Courier New', monospace" font-size="8" fill="#A78BFA" font-weight="700" letter-spacing="0.8">MCP</text>
  <rect x="174" y="311" width="50" height="3.5" rx="1.8" fill="#2D1B69" opacity="0.8"/>
  <rect x="174" y="318" width="36" height="3.5" rx="1.8" fill="#2D1B69" opacity="0.8"/>
  <circle cx="200" cy="282" r="4" fill="#8B5CF6" opacity="0.75"/>

  <!-- ── CENTRAL HUB ── -->
  <!-- Outer ring plate -->
  <circle cx="200" cy="200" r="44" fill="#0E0E12" stroke="#222228" stroke-width="1.5"/>
  <!-- Gradient ring -->
  <circle cx="200" cy="200" r="32" fill="none" stroke="url(#ring)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Inner tick marks -->
  <line x1="200" y1="171" x2="200" y2="176" stroke="#4C1D95" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="200" y1="224" x2="200" y2="229" stroke="#4C1D95" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="171" y1="200" x2="176" y2="200" stroke="#4C1D95" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="224" y1="200" x2="229" y2="200" stroke="#4C1D95" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Core dot -->
  <circle cx="200" cy="200" r="10" fill="#7C3AED" filter="url(#softglow)" opacity="0.95"/>
  <circle cx="200" cy="200" r="5" fill="#DDD6FE"/>
</svg>
